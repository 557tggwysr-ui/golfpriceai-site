name: Update golf deals

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run deal refresh script
        env:
          CJ_API_TOKEN: ${{ secrets.CJ_API_TOKEN }}
          CJ_CID: ${{ secrets.CJ_CID }}
          AWIN_API_TOKEN: ${{ secrets.AWIN_API_TOKEN }}
          AWIN_PUBLISHER_ID: ${{ secrets.AWIN_PUBLISHER_ID }}
          AWIN_ADVERTISER_ID: ${{ secrets.AWIN_ADVERTISER_ID }}
        run: python scripts/update_deals.py

      - name: Commit updated catalog
        run: |
          git config user.name "golfpriceai-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/products.json
          git diff --quiet --cached || git commit -m "Automated catalog refresh"
          git push
